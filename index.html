<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Columns Game</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <!-- ── Tela de menu ── -->
  <div id="screen-menu" class="screen">
    <div class="menu-container">
      <h1 class="game-logo">COLUMNS</h1>
      <div class="menu-gems">
        <span class="mg" style="--c:var(--c1)"></span>
        <span class="mg" style="--c:var(--c2)"></span>
        <span class="mg" style="--c:var(--c3)"></span>
        <span class="mg" style="--c:var(--c4)"></span>
        <span class="mg" style="--c:var(--c5)"></span>
        <span class="mg" style="--c:var(--c6)"></span>
      </div>
      <nav class="menu-nav">
        <button class="menu-btn" id="btn-1p">1 PLAYER</button>
        <button class="menu-btn" id="btn-2p">2 PLAYERS</button>
        <button class="menu-btn menu-btn--secondary" id="btn-settings">SETTINGS</button>
      </nav>
    </div>
  </div>

  <!-- ── Tela de configurações ── -->
  <div id="screen-settings" class="screen" style="display:none">
    <div class="menu-container">
      <h2 class="menu-heading">SETTINGS</h2>
      <p class="settings-placeholder">Em breve...</p>
      <button class="menu-btn menu-btn--secondary" id="btn-back">BACK</button>
    </div>
  </div>

  <!-- ── Jogo ── -->
  <div id="game-wrapper" style="display:none">
    <button id="btn-back-to-menu" class="back-to-menu-btn">&#8592; MENU</button>
    <div id="main-area">

      <!-- P1 NEXT (esquerda) -->
      <div class="side-panel">
        <div class="next-piece-wrapper">
          <span class="next-piece-label">NEXT</span>
          <div id="next-piece-preview" class="next-piece-preview"></div>
        </div>
      </div>

      <!-- P1 tabuleiro -->
      <div class="board-area">
        <span class="player-label">1P</span>
        <div class="board-wrapper">
          <div id="game-board" class="game-board"></div>
        </div>
      </div>

      <!-- Stats centrais (SCORE / GEMS / LEVEL) -->
      <div class="stats-panel">
        <div class="value-display">
          <div class="st-player"><span id="score">0</span></div>
          <div class="label"><span>SCORE</span></div>
          <div class="nd-player"><span id="score-p2">0</span></div>
        </div>
        <div class="value-display">
          <div class="st-player"><span id="gems">0</span></div>
          <div class="label"><span>GEMS</span></div>
          <div class="nd-player"><span id="gems-p2">0</span></div>
        </div>
        <div class="value-display">
          <div class="st-player"><span id="level">1</span></div>
          <div class="label"><span>LEVEL</span></div>
          <div class="nd-player"><span id="level-p2">1</span></div>
        </div>
      </div>

      <!-- P2 tabuleiro (oculto) -->
      <div class="board-area" id="board-wrapper-p2" style="display:none">
        <span class="player-label">2P</span>
        <div class="board-wrapper">
          <div id="game-board-p2" class="game-board"></div>
        </div>
      </div>

      <!-- P2 NEXT (direita, oculto) -->
      <div class="side-panel" id="side-panel-p2" style="display:none">
        <div class="next-piece-wrapper">
          <span class="next-piece-label">NEXT</span>
          <div id="next-piece-preview-p2" class="next-piece-preview"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Overlay único compartilhado entre todos os jogos -->
  <div id="game-over" class="game-over">
    <div class="game-over-modal">
      <p class="modal-title" id="modal-title">GAME OVER</p>
      <p class="pause-hint">PRESSIONE "ESC" PARA RETOMAR O JOGO.</p>
      <p class="game-over-score-line">Score: <span id="final-score">0</span></p>
      <button id="retry-btn" class="retry-btn">RETRY</button>
      <div class="modal-confirm-btns">
        <button id="btn-confirm-no"  class="retry-btn">NÃO</button>
        <button id="btn-confirm-yes" class="retry-btn confirm-yes">SIM</button>
      </div>
    </div>
  </div>

  <script src="js/config/constants.js"></script>
  <script src="js/utils/colors.js"></script>
  <script src="js/classes/Piece.js"></script>
  <script src="js/classes/Board.js"></script>
  <script src="js/classes/Screen.js"></script>
  <script src="js/classes/InputHandler.js"></script>
  <script src="js/classes/ExplosionEffect.js"></script>
  <script src="js/classes/Game.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
