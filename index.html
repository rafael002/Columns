<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Columns Game</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score">0</span>
      <span id="gems">0</span>
      <span id="level">1</span>
    </div>
    <div id="main-area">
      <div id="board-wrapper">
        <div id="game-board"></div>
        <div id="game-over">
          <div id="game-over-modal">
            <p id="game-over-title">GAME OVER</p>
            <p id="game-over-score">Score: <span id="final-score">0</span></p>
            <button id="retry-btn">RETRY</button>
          </div>
        </div>
      </div>
      <div id="next-piece-wrapper">
        <span id="next-piece-label">NEXT</span>
        <div id="next-piece-preview"></div>
      </div>
    </div>
  </div>

  <script src="js/config/constants.js"></script>
  <script src="js/utils/colors.js"></script>
  <script src="js/classes/Piece.js"></script>
  <script src="js/classes/Board.js"></script>
  <script src="js/classes/Screen.js"></script>
  <script src="js/classes/InputHandler.js"></script>
  <script src="js/classes/ExplosionEffect.js"></script>
  <script src="js/classes/Game.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
